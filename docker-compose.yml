services:
  # Long-running sampler. This is what a Portainer stack deploys.
  probe:
    build: .
    image: nemr-probe
    container_name: nemr-probe
    restart: unless-stopped
    shm_size: 1gb
    environment:
      # Track ids that go grey for you, comma separated. From a track URL:
      # https://music.163.com/#/song?id=1234567  ->  1234567
      TRACK_IDS: "${TRACK_IDS:?set TRACK_IDS in the stack env}"
      # 6h. Shorter than the suspected region-cache TTL, long enough that the
      # TTL is still measurable from the log.
      PROBE_INTERVAL_SEC: "${PROBE_INTERVAL_SEC:-21600}"
      SETTLE_MS: "${SETTLE_MS:-10000}"
    volumes:
      - ./data:/data
      # Uncomment to use your own NetEaseMusicWorld+ instead of the ++ baked
      # into the image. Copy the unpacked extension folder to ./ext first.
      # - ./ext:/ext:ro

  # One-off, interactive. Run when the probe reports loggedIn: false:
  #   docker compose run --rm --service-ports login
  login:
    build: .
    image: nemr-probe
    container_name: nemr-login
    profiles: ["manual"]
    shm_size: 1gb
    entrypoint: ["/app/login-entrypoint.sh"]
    environment:
      TRACK_IDS: "${TRACK_IDS:-}"
      SETTLE_MS: "${SETTLE_MS:-10000}"
      LOGIN_HOLD_MS: "${LOGIN_HOLD_MS:-600000}"
    ports:
      - "127.0.0.1:5900:5900"
    volumes:
      - ./data:/data
      # - ./ext:/ext:ro
