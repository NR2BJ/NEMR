services:
  nemr:
    build: .                 # built on the server from this repo — no registry needed
    image: nemr
    container_name: nemr
    restart: unless-stopped
    environment:
      # Paste the line printed by the extract script here (one time). Once the
      # /data volume has bootstrapped its cookies.json you can remove this.
      NEMR_COOKIE: "${NEMR_COOKIE:-}"
      # Mainland-China IP for the X-Real-IP header. Default is the one the
      # NetEaseMusicWorld extension hardcodes; override if it stops working.
      REGION_IP: "${REGION_IP:-211.161.244.70}"
      # How often to refresh the session + region flag. 6h default.
      INTERVAL_SEC: "${INTERVAL_SEC:-21600}"
      # Optional: grey-track ids to observe, comma separated. From a track URL
      # https://music.163.com/#/song?id=1234567 -> 1234567
      TRACK_IDS: "${TRACK_IDS:-}"
    volumes:
      # Named volume Docker creates automatically — holds the rotated cookies and
      # the log. Nothing to place on the host.
      - nemr-data:/data

volumes:
  nemr-data:
