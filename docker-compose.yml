services:
  nemr:
    build: .
    image: nemr
    container_name: nemr
    restart: unless-stopped
    environment:
      # Mainland-China IP put in the X-Real-IP header. The default is the one
      # NetEaseMusicWorld hardcodes; override if it ever stops working.
      REGION_IP: "${REGION_IP:-211.161.244.70}"
      # How often to refresh the session + region flag. 6h default.
      INTERVAL_SEC: "${INTERVAL_SEC:-21600}"
      # Optional: grey-track ids to observe, comma separated. From a track URL
      # https://music.163.com/#/song?id=1234567 -> 1234567
      TRACK_IDS: "${TRACK_IDS:-}"
    volumes:
      # cookies.json (the seed) and the log live here. Seed it before first run.
      # Set DATA_DIR to an absolute host path when deploying from a Portainer Git
      # stack — a relative ./data would resolve inside Portainer's clone dir,
      # where you can't easily place the cookie. e.g. DATA_DIR=/opt/nemr/data
      - ${DATA_DIR:-./data}:/data
